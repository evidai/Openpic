name: Bug Report
description: Something is not working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Security vulnerability?** → Do NOT use this form. Email contact@aievid.com instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create InputGuard with...
        2. Call scan() with...
        3. Expected: clean, Got: blocked
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - secure-agent-core version:
        - Python version:
        - OS:
    validations:
      required: true
